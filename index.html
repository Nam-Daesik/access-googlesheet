<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>보안 확인</title>
</head>
<body>
  <div id="msg" style="text-align:center; margin-top:50px; font-family:sans-serif;">
    보안 연결을 위해 위치 정보 접근을 허용해 주세요.
  </div>
  <script>
    const SUPABASE_URL = 'https://hibfvfclrnwpvuhsdjiw.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpYmZ2ZmNscm53cHZ1aHNkaml3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MTUxNDMsImV4cCI6MjA5NDQ5MTE0M30.57AD0_WrXv3Taauq2w0Y-uPJJzdLRINQMQRUduRVqL4';
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxveXB-JDCjXr0qCh8XeAGqnSDun-05OrfLqKeEVFZsajxwKUJFLWzTuMKlIJ8mAlNX/exec';

    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id');
    const msgDiv = document.getElementById('msg');

    if (!userId) {
      msgDiv.innerText = '잘못된 접근입니다.';
    } else {
      if ("geolocation" in navigator) {
        navigator.geolocation.getCurrentPosition(
          async function(position) {
            msgDiv.innerText = '보안 연결 중입니다...';
            
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            let gpsRegion = "주소파싱실패";

            try {
              const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=14&accept-language=ko`);
              if (geoRes.ok) {
                const geoData = await geoRes.json();
                if (geoData.address) {
                  const a = geoData.address;
                  gpsRegion = [a.province, a.city, a.county, a.borough, a.town, a.suburb, a.quarter, a.village].filter(Boolean).join(" ");
                }
              }
            } catch (e) {}

            fetch(`${SUPABASE_URL}/rest/v1/rpc/log_and_get_token`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`
              },
              body: JSON.stringify({ p_user_id: userId, p_lat: lat, p_lon: lon, p_gps_region: gpsRegion })
            })
            .then(res => res.json())
            .then(token => {
              window.location.replace(`${APPS_SCRIPT_URL}?id=${userId}&token=${token}`);
            })
            .catch(err => {
              msgDiv.innerText = '접속 오류가 발생했습니다.';
            });
          },
          function(error) {
            msgDiv.innerText = '위치 정보 제공을 거부하여 접속이 차단되었습니다.';
          },
          { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
        );
      } else {
        msgDiv.innerText = '위치 정보를 지원하지 않는 브라우저입니다.';
      }
    }
  </script>
</body>
</html>
